<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portal - Secure Access</title>
    <style>
        /* Modern Premium SaaS Color Variables */
        :root {
            --bg-dark: #030712;
            --glass-surface: rgba(17, 24, 39, 0.6);
            --border-glow: rgba(255, 255, 255, 0.08);
            --accent-indigo: #4f46e5;
            --accent-cyan: #06b6d4;
            --text-light: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Animated Background Mesh */
        .ambient-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #111827 0%, #030712 100%);
        }

        .blur-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
        }
        .orb-indigo { background: var(--accent-indigo); top: -10%; left: -10%; }
        .orb-cyan { background: var(--accent-cyan); bottom: -10%; right: -10%; }

        /* Glassmorphic Auth Container Layout */
        .auth-container {
            background: var(--glass-surface);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border-glow);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Tactile Action Buttons */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(180deg, #5a52ff 0%, #4f46e5 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Switch Toggle Layout Text link */
        .switch-mode-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .switch-mode-text span {
            color: var(--accent-cyan);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        /* Dynamic Feedback Message Banners */
        .msg-box {
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            text-align: center;
            display: none;
        }
        .msg-error { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

        .hidden { display: none !important; }

        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="blur-orb orb-indigo"></div>
        <div class="blur-orb orb-cyan"></div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to monitor your academic trajectory</p>
        </div>

        <div id="feedback-msg" class="msg-box"></div>

        <form id="auth-form">
            <div class="form-group hidden" id="username-group">
                <label for="input-username">Username</label>
                <input type="text" id="input-username" placeholder="Choose a handle">
            </div>

            <div class="form-group">
                <label for="input-email">Email Address</label>
                <input type="email" id="input-email" required placeholder="name@university.edu">
            </div>

            <div class="form-group">
                <label for="input-password">Password</label>
                <input type="password" id="input-password" required placeholder="••••••••">
            </div>

            <button type="submit" id="btn-action" class="btn-submit">Sign In</button>
        </form>

        <p class="switch-mode-text" id="toggle-hint">
            Don't have an account account? <span id="switch-trigger" onclick="toggleAuthMode()">Sign Up here</span>
        </p>
    </div>

    <script>
        // 1. STATE & ELEMENT REGISTRY
        let isLoginMode = true;
        const API_AUTH_URL = 'http://localhost:8080/api/auth';

        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const usernameGroup = document.getElementById('username-group');
        const inputUsername = document.getElementById('input-username');
        const inputEmail = document.getElementById('input-email');
        const inputPassword = document.getElementById('input-password');
        const btnAction = document.getElementById('btn-action');
        const toggleHint = document.getElementById('toggle-hint');
        const feedbackMsg = document.getElementById('feedback-msg');

        // 2. TOGGLE LAYOUT INTERACTIVE STATES
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            clearNotification();
            authForm.reset();
            
            if (isLoginMode) {
                authTitle.innerText = "Welcome Back";
                authSubtitle.innerText = "Sign in to monitor your academic trajectory";
                usernameGroup.classList.add('hidden');
                inputUsername.removeAttribute('required');
                btnAction.innerText = "Sign In";
                toggleHint.innerHTML = `Don't have an account? <span id="switch-trigger" onclick="toggleAuthMode()">Sign Up here</span>`;
            } else {
                authTitle.innerText = "Create Account";
                authSubtitle.innerText = "Begin mapping your performance metrics";
                usernameGroup.classList.remove('hidden');
                inputUsername.setAttribute('required', 'true');
                btnAction.innerText = "Register Account";
                toggleHint.innerHTML = `Already registered? <span id="switch-trigger" onclick="toggleAuthMode()">Sign In instead</span>`;
            }
        }

        // 3. CORE SERVICE INTERACTION: FORM SUBMISSION HANDLER
        authForm.addEventListener('submit', async (event) => {
            event.preventDefault(); // Stop native page reload action
            clearNotification();

            // Package data properties dynamically depending on the active state mode
            const payload = {
                email: inputEmail.value.trim(),
                password: inputPassword.value
            };

            if (!isLoginMode) {
                payload.username = inputUsername.value.trim();
            }

            // Determine network destination path mapping
            const targetEndpoint = isLoginMode ? `${API_AUTH_URL}/login` : `${API_AUTH_URL}/signup`;

            try {
                btnAction.innerText = "Processing Transaction...";
                btnAction.disabled = true;

                const response = await fetch(targetEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    // Fallback to server thrown message or standard failure strings
                    throw new Error(data.message || "Network validation check rejected.");
                }

                if (isLoginMode) {
                    // ACTION: LOGIN SUCCESSFUL
                    // Lock user profile identity variables down inside the browser memory cards
                    localStorage.setItem('tracker_user_id', data.id);
                    localStorage.setItem('tracker_user_name', data.username);
                    
                    showNotification("Identity verified. Accessing system profile...", "success");
                    
                    // Smooth delay to allow user to view the success message before transition
                    setTimeout(() => {
                        window.location.href = 'tracker.html'; // Reroute to our tracking dashboard
                    }, 1200);
                } else {
                    // ACTION: SIGNUP SUCCESSFUL
                    showNotification("Account registered completely! Re-orienting to sign in...", "success");
                    setTimeout(() => {
                        toggleAuthMode(); // Pivot layout view smoothly back onto login screen
                    }, 2000);
                }

            } catch (error) {
                showNotification(error.message, "error");
            } finally {
                btnAction.innerText = isLoginMode ? "Sign In" : "Register Account";
                btnAction.disabled = false;
            }
        });

        // 4. UI FEEDBACK UTILITY FUNCTIONS
        function showNotification(message, statusType) {
            feedbackMsg.innerText = message;
            feedbackMsg.className = `msg-box msg-${statusType}`;
            feedbackMsg.style.display = 'block';
        }

        function clearNotification() {
            feedbackMsg.innerText = '';
            feedbackMsg.style.display = 'none';
        }
    </script>
</body>
</html>
